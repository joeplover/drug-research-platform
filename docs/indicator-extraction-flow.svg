<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .text { font: 500 18px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .small { font: 500 16px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="700" y="52" text-anchor="middle" class="title">指标抽取流程图</text>

  <rect x="90" y="280" width="210" height="80" rx="12" ry="12" class="box"/>
  <text x="195" y="330" text-anchor="middle" class="text">文献切片内容</text>

  <rect x="380" y="220" width="260" height="200" rx="12" ry="12" class="box"/>
  <text x="510" y="268" text-anchor="middle" class="text">关键词匹配</text>
  <text x="510" y="308" text-anchor="middle" class="small">HBsAg / HBV DNA / pgRNA</text>
  <text x="510" y="340" text-anchor="middle" class="small">ALT / AST / HBeAg</text>
  <text x="510" y="376" text-anchor="middle" class="small">映射到指标类别</text>

  <rect x="720" y="160" width="260" height="120" rx="12" ry="12" class="box"/>
  <text x="850" y="205" text-anchor="middle" class="text">时间窗推断</text>
  <text x="850" y="240" text-anchor="middle" class="small">W24 / week 24 / 24 weeks</text>

  <rect x="720" y="320" width="260" height="120" rx="12" ry="12" class="box"/>
  <text x="850" y="365" text-anchor="middle" class="text">人群推断</text>
  <text x="850" y="400" text-anchor="middle" class="small">3mg / placebo / overall 等</text>

  <rect x="720" y="480" width="260" height="120" rx="12" ry="12" class="box"/>
  <text x="850" y="525" text-anchor="middle" class="text">数值与证据提取</text>
  <text x="850" y="560" text-anchor="middle" class="small">正则提取数值与片段</text>

  <rect x="1070" y="280" width="240" height="120" rx="12" ry="12" class="box"/>
  <text x="1190" y="325" text-anchor="middle" class="text">结构化指标结果</text>
  <text x="1190" y="360" text-anchor="middle" class="small">study_indicator</text>

  <line x1="300" y1="320" x2="380" y2="320" class="line" marker-end="url(#arrow)"/>
  <line x1="640" y1="250" x2="720" y2="220" class="line" marker-end="url(#arrow)"/>
  <line x1="640" y1="320" x2="720" y2="380" class="line" marker-end="url(#arrow)"/>
  <line x1="640" y1="390" x2="720" y2="540" class="line" marker-end="url(#arrow)"/>
  <line x1="980" y1="220" x2="1070" y2="300" class="line" marker-end="url(#arrow)"/>
  <line x1="980" y1="380" x2="1070" y2="340" class="line" marker-end="url(#arrow)"/>
  <line x1="980" y1="540" x2="1070" y2="380" class="line" marker-end="url(#arrow)"/>

  <text x="700" y="700" text-anchor="middle" class="small">说明：该流程依据 KnowledgeExtractionService 的实际实现绘制，当前抽取主要采用关键词匹配与正则规则。</text>
</svg>

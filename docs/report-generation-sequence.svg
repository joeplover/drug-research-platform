<svg width="1400" height="920" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .head { font: 700 18px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .text { font: 500 16px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; }
      .dash { stroke: #111111; stroke-width: 1.7; fill: none; stroke-dasharray: 8 6; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="#ffffff"/>
  <text x="700" y="52" text-anchor="middle" class="title">分析报告生成时序图</text>

  <!-- participants -->
  <rect x="80" y="90" width="150" height="50" rx="10" ry="10" class="box"/>
  <text x="155" y="122" text-anchor="middle" class="head">用户</text>

  <rect x="300" y="90" width="170" height="50" rx="10" ry="10" class="box"/>
  <text x="385" y="122" text-anchor="middle" class="head">前端页面</text>

  <rect x="550" y="90" width="190" height="50" rx="10" ry="10" class="box"/>
  <text x="645" y="122" text-anchor="middle" class="head">AnalysisService</text>

  <rect x="820" y="90" width="150" height="50" rx="10" ry="10" class="box"/>
  <text x="895" y="122" text-anchor="middle" class="head">RagService</text>

  <rect x="1040" y="90" width="190" height="50" rx="10" ry="10" class="box"/>
  <text x="1135" y="122" text-anchor="middle" class="head">抽取与文献服务</text>

  <rect x="1250" y="90" width="110" height="50" rx="10" ry="10" class="box"/>
  <text x="1305" y="122" text-anchor="middle" class="head">LLM</text>

  <!-- lifelines -->
  <line x1="155" y1="140" x2="155" y2="850" class="dash"/>
  <line x1="385" y1="140" x2="385" y2="850" class="dash"/>
  <line x1="645" y1="140" x2="645" y2="850" class="dash"/>
  <line x1="895" y1="140" x2="895" y2="850" class="dash"/>
  <line x1="1135" y1="140" x2="1135" y2="850" class="dash"/>
  <line x1="1305" y1="140" x2="1305" y2="850" class="dash"/>

  <!-- calls -->
  <line x1="155" y1="190" x2="385" y2="190" class="line" marker-end="url(#arrow)"/>
  <text x="270" y="178" text-anchor="middle" class="text">提交问题与分析焦点</text>

  <line x1="385" y1="250" x2="645" y2="250" class="line" marker-end="url(#arrow)"/>
  <text x="515" y="238" text-anchor="middle" class="text">调用 /api/analysis/reports</text>

  <line x1="645" y1="320" x2="895" y2="320" class="line" marker-end="url(#arrow)"/>
  <text x="770" y="308" text-anchor="middle" class="text">检索相关证据</text>

  <line x1="895" y1="380" x2="645" y2="380" class="line" marker-end="url(#arrow)"/>
  <text x="770" y="368" text-anchor="middle" class="text">返回证据片段与分数</text>

  <line x1="645" y1="450" x2="1135" y2="450" class="line" marker-end="url(#arrow)"/>
  <text x="890" y="438" text-anchor="middle" class="text">查询文献并汇总指标结果</text>

  <line x1="1135" y1="510" x2="645" y2="510" class="line" marker-end="url(#arrow)"/>
  <text x="890" y="498" text-anchor="middle" class="text">返回指标、摘要与上下文</text>

  <line x1="645" y1="580" x2="1305" y2="580" class="line" marker-end="url(#arrow)"/>
  <text x="975" y="568" text-anchor="middle" class="text">提交提示词与证据生成报告</text>

  <line x1="1305" y1="640" x2="645" y2="640" class="line" marker-end="url(#arrow)"/>
  <text x="975" y="628" text-anchor="middle" class="text">返回报告文本或触发兜底模板</text>

  <line x1="645" y1="710" x2="385" y2="710" class="line" marker-end="url(#arrow)"/>
  <text x="515" y="698" text-anchor="middle" class="text">返回分析结果、证据和指标</text>

  <line x1="385" y1="780" x2="155" y2="780" class="line" marker-end="url(#arrow)"/>
  <text x="270" y="768" text-anchor="middle" class="text">页面展示报告与引用内容</text>

  <!-- activation hints -->
  <rect x="635" y="225" width="20" height="525" class="box"/>
  <rect x="885" y="300" width="20" height="100" class="box"/>
  <rect x="1125" y="430" width="20" height="100" class="box"/>
  <rect x="1295" y="560" width="20" height="100" class="box"/>

  <text x="700" y="880" text-anchor="middle" class="text">说明：该流程对应 AnalysisService、RagService、KnowledgeExtractionService 和 OpenAiReportClient 的实际调用关系。</text>
</svg>

<svg width="1400" height="980" viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .head { font: 700 20px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .text { font: 500 16px 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; fill: #111111; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#ffffff"/>
  <text x="700" y="52" text-anchor="middle" class="title">系统核心数据表关系图</text>

  <!-- literature -->
  <rect x="120" y="110" width="320" height="170" class="box" rx="12" ry="12"/>
  <line x1="120" y1="152" x2="440" y2="152" class="line"/>
  <text x="280" y="138" text-anchor="middle" class="head">literature</text>
  <text x="145" y="185" class="text">PK id</text>
  <text x="145" y="212" class="text">title</text>
  <text x="145" y="239" class="text">source_type</text>
  <text x="145" y="266" class="text">disease_area / summary / keywords</text>

  <!-- chunk -->
  <rect x="520" y="80" width="320" height="190" class="box" rx="12" ry="12"/>
  <line x1="520" y1="122" x2="840" y2="122" class="line"/>
  <text x="680" y="108" text-anchor="middle" class="head">literature_chunk</text>
  <text x="545" y="155" class="text">PK id</text>
  <text x="545" y="182" class="text">FK literature_id</text>
  <text x="545" y="209" class="text">chunk_index / content</text>
  <text x="545" y="236" class="text">embedding_json / chunk_label</text>

  <!-- indicator -->
  <rect x="520" y="320" width="320" height="210" class="box" rx="12" ry="12"/>
  <line x1="520" y1="362" x2="840" y2="362" class="line"/>
  <text x="680" y="348" text-anchor="middle" class="head">study_indicator</text>
  <text x="545" y="395" class="text">PK id</text>
  <text x="545" y="422" class="text">FK literature_id</text>
  <text x="545" y="449" class="text">indicator_name / category</text>
  <text x="545" y="476" class="text">time_window / cohort / observed_value</text>
  <text x="545" y="503" class="text">evidence_snippet / evidence_locator</text>

  <!-- state -->
  <rect x="930" y="300" width="320" height="190" class="box" rx="12" ry="12"/>
  <line x1="930" y1="342" x2="1250" y2="342" class="line"/>
  <text x="1090" y="328" text-anchor="middle" class="head">indicator_state</text>
  <text x="955" y="375" class="text">PK id</text>
  <text x="955" y="402" class="text">FK literature_id</text>
  <text x="955" y="429" class="text">indicator_name / stage_type / state_order</text>
  <text x="955" y="456" class="text">state_label / description</text>

  <!-- transition -->
  <rect x="930" y="560" width="320" height="190" class="box" rx="12" ry="12"/>
  <line x1="930" y1="602" x2="1250" y2="602" class="line"/>
  <text x="1090" y="588" text-anchor="middle" class="head">state_transition</text>
  <text x="955" y="635" class="text">PK id</text>
  <text x="955" y="662" class="text">FK literature_id</text>
  <text x="955" y="689" class="text">FK from_state_id / to_state_id</text>
  <text x="955" y="716" class="text">condition_text / transition_probability</text>

  <!-- task -->
  <rect x="120" y="620" width="320" height="170" class="box" rx="12" ry="12"/>
  <line x1="120" y1="662" x2="440" y2="662" class="line"/>
  <text x="280" y="648" text-anchor="middle" class="head">analysis_task</text>
  <text x="145" y="695" class="text">PK id</text>
  <text x="145" y="722" class="text">task_type / status</text>
  <text x="145" y="749" class="text">input_text / result_summary / citations</text>
  <text x="145" y="776" class="text">context_literature_ids</text>

  <!-- log -->
  <rect x="520" y="660" width="320" height="150" class="box" rx="12" ry="12"/>
  <line x1="520" y1="702" x2="840" y2="702" class="line"/>
  <text x="680" y="688" text-anchor="middle" class="head">operation_log</text>
  <text x="545" y="735" class="text">PK id</text>
  <text x="545" y="762" class="text">operator_email / action_type</text>
  <text x="545" y="789" class="text">resource_type / resource_id / detail</text>

  <!-- user -->
  <rect x="120" y="360" width="320" height="170" class="box" rx="12" ry="12"/>
  <line x1="120" y1="402" x2="440" y2="402" class="line"/>
  <text x="280" y="388" text-anchor="middle" class="head">platform_user</text>
  <text x="145" y="435" class="text">PK id</text>
  <text x="145" y="462" class="text">username / email</text>
  <text x="145" y="489" class="text">password_hash / role / status</text>

  <!-- relation lines -->
  <line x1="440" y1="188" x2="520" y2="175" class="line" marker-end="url(#arrow)"/>
  <text x="470" y="165" class="text">1:N</text>

  <line x1="440" y1="230" x2="520" y2="395" class="line" marker-end="url(#arrow)"/>
  <text x="455" y="330" class="text">1:N</text>

  <line x1="840" y1="425" x2="930" y2="395" class="line" marker-end="url(#arrow)"/>
  <text x="870" y="392" class="text">派生</text>

  <line x1="1090" y1="490" x2="1090" y2="560" class="line" marker-end="url(#arrow)"/>
  <text x="1104" y="530" class="text">1:N</text>

  <line x1="440" y1="705" x2="520" y2="735" class="line" marker-end="url(#arrow)"/>
  <text x="468" y="704" class="text">过程记录</text>

  <line x1="280" y1="530" x2="280" y2="620" class="line" marker-end="url(#arrow)"/>
  <text x="292" y="584" class="text">用户产生任务</text>

  <line x1="320" y1="530" x2="560" y2="660" class="line" marker-end="url(#arrow)"/>
  <text x="412" y="612" class="text">用户产生日志</text>

  <line x1="440" y1="445" x2="930" y2="355" class="line" marker-end="url(#arrow)"/>
  <text x="658" y="382" class="text">文献关联状态</text>

  <!-- footer -->
  <text x="700" y="920" text-anchor="middle" class="text">说明：当前系统使用 MySQL 保存核心业务数据，向量结果以 JSON 形式保存在 literature_chunk 表中。</text>
</svg>

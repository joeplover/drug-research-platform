<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .text { font: 500 18px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .small { font: 500 16px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="700" y="52" text-anchor="middle" class="title">用户登录与注册流程图</text>

  <rect x="100" y="250" width="220" height="90" rx="12" ry="12" class="box"/>
  <text x="210" y="305" text-anchor="middle" class="text">登录页 / 注册页</text>

  <rect x="410" y="150" width="280" height="120" rx="12" ry="12" class="box"/>
  <text x="550" y="195" text-anchor="middle" class="text">注册流程</text>
  <text x="550" y="232" text-anchor="middle" class="small">校验用户名、邮箱、密码</text>

  <rect x="410" y="360" width="280" height="120" rx="12" ry="12" class="box"/>
  <text x="550" y="405" text-anchor="middle" class="text">登录流程</text>
  <text x="550" y="442" text-anchor="middle" class="small">校验邮箱、密码与账号状态</text>

  <rect x="790" y="150" width="260" height="120" rx="12" ry="12" class="box"/>
  <text x="920" y="195" text-anchor="middle" class="text">UserService</text>
  <text x="920" y="232" text-anchor="middle" class="small">create / register / login</text>

  <rect x="790" y="360" width="260" height="120" rx="12" ry="12" class="box"/>
  <text x="920" y="405" text-anchor="middle" class="text">PasswordHashService</text>
  <text x="920" y="442" text-anchor="middle" class="small">SHA-256 哈希与比对</text>

  <rect x="1140" y="250" width="180" height="90" rx="12" ry="12" class="box"/>
  <text x="1230" y="305" text-anchor="middle" class="text">platform_user</text>

  <rect x="1140" y="470" width="180" height="90" rx="12" ry="12" class="box"/>
  <text x="1230" y="525" text-anchor="middle" class="text">本地会话保存</text>

  <line x1="320" y1="250" x2="410" y2="210" class="line" marker-end="url(#arrow)"/>
  <line x1="320" y1="340" x2="410" y2="420" class="line" marker-end="url(#arrow)"/>
  <line x1="690" y1="210" x2="790" y2="210" class="line" marker-end="url(#arrow)"/>
  <line x1="690" y1="420" x2="790" y2="420" class="line" marker-end="url(#arrow)"/>
  <line x1="920" y1="270" x2="920" y2="360" class="line" marker-end="url(#arrow)"/>
  <line x1="1050" y1="210" x2="1140" y2="295" class="line" marker-end="url(#arrow)"/>
  <line x1="1050" y1="420" x2="1140" y2="515" class="line" marker-end="url(#arrow)"/>

  <text x="700" y="700" text-anchor="middle" class="small">说明：该流程依据 LoginView.vue、user.ts、UserController、UserService 和 PasswordHashService 的实际实现绘制。</text>
</svg>

<svg width="1400" height="720" viewBox="0 0 1400 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .text { font: 500 18px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .small { font: 500 16px 'Microsoft YaHei', Arial, sans-serif; fill: #111111; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="720" fill="#ffffff"/>
  <text x="700" y="54" text-anchor="middle" class="title">RAG 检索流程图</text>

  <rect x="80" y="260" width="180" height="80" rx="12" ry="12" class="box"/>
  <text x="170" y="310" text-anchor="middle" class="text">用户问题</text>

  <rect x="340" y="220" width="220" height="160" rx="12" ry="12" class="box"/>
  <text x="450" y="265" text-anchor="middle" class="text">查询预处理</text>
  <text x="450" y="308" text-anchor="middle" class="small">tokenize(query)</text>
  <text x="450" y="342" text-anchor="middle" class="small">embed(query)</text>

  <rect x="640" y="220" width="260" height="160" rx="12" ry="12" class="box"/>
  <text x="770" y="265" text-anchor="middle" class="text">遍历文献切片</text>
  <text x="770" y="308" text-anchor="middle" class="small">读取 literature_chunk</text>
  <text x="770" y="342" text-anchor="middle" class="small">获取 content 与 embedding_json</text>

  <rect x="980" y="160" width="280" height="120" rx="12" ry="12" class="box"/>
  <text x="1120" y="205" text-anchor="middle" class="text">词项匹配分数</text>
  <text x="1120" y="240" text-anchor="middle" class="small">calculateScore(queryTokens, fields)</text>

  <rect x="980" y="320" width="280" height="120" rx="12" ry="12" class="box"/>
  <text x="1120" y="365" text-anchor="middle" class="text">向量相似度分数</text>
  <text x="1120" y="400" text-anchor="middle" class="small">cosineSimilarity(queryVector, chunkVector)</text>

  <rect x="980" y="500" width="280" height="110" rx="12" ry="12" class="box"/>
  <text x="1120" y="543" text-anchor="middle" class="text">混合排序结果</text>
  <text x="1120" y="578" text-anchor="middle" class="small">lexical + semantic → 排序 → TopK</text>

  <line x1="260" y1="300" x2="340" y2="300" class="line" marker-end="url(#arrow)"/>
  <line x1="560" y1="300" x2="640" y2="300" class="line" marker-end="url(#arrow)"/>
  <line x1="900" y1="260" x2="980" y2="220" class="line" marker-end="url(#arrow)"/>
  <line x1="900" y1="340" x2="980" y2="380" class="line" marker-end="url(#arrow)"/>
  <line x1="1120" y1="280" x2="1120" y2="320" class="line"/>
  <line x1="1120" y1="440" x2="1120" y2="500" class="line" marker-end="url(#arrow)"/>

  <text x="700" y="660" text-anchor="middle" class="small">说明：该流程对应 RagService 的实际实现，当前检索采用“词项匹配 + 向量相似度”的轻量混合评分方式。</text>
</svg>
